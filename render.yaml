services:
  - type: web
    name: leadflow-pro-api
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx playwright install --with-deps chromium
    startCommand: npx prisma migrate deploy && node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MOLLIE_API_KEY
        sync: false
      - key: MOLLIE_WEBHOOK_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
  - type: worker
    name: leadflow-pro-worker
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx playwright install --with-deps chromium
    startCommand: npx prisma migrate deploy && node backend/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false